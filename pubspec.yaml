name: nextstore
description: "A modern e-commerce application."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  provider: ^6.1.5+1
  google_fonts: ^8.0.2
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/icon/nextstore.png"
  android: "launcher_icon"
  min_sdk_android: 21
  ios: true

flutter_native_splash:
  color: "#fbf8ff"
  color_dark: "#121318"
  image: "assets/icon/nextstore.png"
  android: true
  ios: true
  android_12:
    color: "#fbf8ff"
    color_dark: "#121318"
    image: "assets/icon/nextstore.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
